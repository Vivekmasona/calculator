<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="msapplication-TileColor" content="#af0a1a">
    <meta name="theme-color" content="#ffffff">
    <link rel="shortcut icon" href="img/fav-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/c.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/c.png">
    <link rel="apple-touch-icon" href="img/fav-57.png">
    <link rel="apple-touch-icon" sizes="114x114" href="img/c.png">
    <link rel="apple-touch-icon" sizes="72x72" href="img/c.png">
    <link rel="apple-touch-icon" sizes="144x144" href="img/c.png">
    <link rel="manifest" href="pwa-manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script type='text/javascript' src="js/main.js"></script>
</head>
<body>
    <div class="content">
        
    
  <!doctype html>


    
    
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .header {
            background-color: red;
            padding: 10px;
            text-align: center;
            font-size: 24px;
        }

        .calendar {
            width: 100%;
            height: calc(100% - 100px); /* Footer height */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #monthYear {
            font-size: 24px;
        }

        #calendarTable {
            width: 100%;
        }

        #calendarTable th,
        #calendarTable td {
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
            cursor: pointer; /* Add cursor pointer for clickable cells */
        }

        .today {
            background-color: red;
            color: white;
        }

        .festival {
            background-color: gold;
            font-weight: bold;
        }

        input[type="button"] {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        .footer {
            background-color: red;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        /* Popup style */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .popup-content {
            text-align: center;
        }
    </style>



<div class="header">
    Calendar: <span id="currentDate"></span>
</div>
<div class="calendar">
    <div class="header">
        <button id="prevBtn">&lt;</button>
        <h2 id="monthYear"></h2>
        <button id="nextBtn">&gt;</button>
    </div>
    <table id="calendarTable">
        <!-- Calendar dates will be dynamically generated here -->
    </table>
</div>
<div class="footer">
    Developer: dristi Kumari
</div>

<!-- Popup for festivals -->
<div id="popup" class="popup">
    <div class="popup-content" id="popupContent"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const monthYear = document.getElementById("monthYear");
        const currentDateSpan = document.getElementById("currentDate");
        const calendarTable = document.getElementById("calendarTable");
        const popup = document.getElementById("popup");
        const popupContent = document.getElementById("popupContent");

        let currentDate = new Date();
        const festivals = {
            "2024-02-21": "Maha Shivaratri",
            "2024-03-09": "Holi",
            // Add more festival dates here as needed
        };

        function renderCalendar() {
            const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

            let firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            let lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
            let firstDayIndex = firstDay.getDay();
            let lastDayIndex = lastDay.getDate();
            let nextMonthDays = 7 - lastDay.getDay() - 1;

            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            monthYear.innerHTML = `${months[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            currentDateSpan.innerHTML = currentDate.toDateString();

            let days = "";

            for (let i = 0; i < daysOfWeek.length; i++) {
                days += `<th>${daysOfWeek[i]}</th>`;
            }
            days += `</tr><tr>`;

            for (let x = firstDayIndex; x > 0; x--) {
                days += `<td class="other-month">${lastDayIndex - x + 1}</td>`;
            }

            for (let i = 1; i <= lastDayIndex; i++) {
                let cellClass = "";
                if (i === new Date().getDate() && currentDate.getMonth() === new Date().getMonth()) {
                    cellClass = "today";
                }
                days += `<td class="${cellClass}" data-date="${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${i}">${i}</td>`;
                if ((i + firstDayIndex) % 7 === 0) {
                    days += `</tr><tr>`;
                }
            }

            for (let j = 1; j <= nextMonthDays; j++) {
                days += `<td class="other-month">${j}</td>`;
            }

            calendarTable.innerHTML = `<tr>${days}</tr>`;
        }

        renderCalendar();

        prevBtn.addEventListener("click", function() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener("click", function() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Popup logic
        calendarTable.addEventListener("click", function(event) {
            const target = event.target;
            if (target.tagName === "TD" && target.classList.contains("today")) {
                const date = target.getAttribute("data-date");
                const festival = festivals[date];
                if (festival) {
                    popupContent.innerHTML = festival;
                    popup.style.display = "block";
                }
            }
        });

        // Close popup when clicked outside of it
        window.addEventListener("click", function(event) {
            if (event.target === popup) {
                popup.style.display = "none";
            }
        });
    });
</script>


</!doctype>  
    
    
    
    </div>
</body>
</html>
